<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encuesta de Opinión</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <h1>Encuesta de Opinión</h1>

    <form action="guardar_respuestas.php" method="post">

        <!-- 1. DATOS PERSONALES -->
        <fieldset>
            <legend>Datos personales</legend>

            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre" required><br>

            <label for="edad">Edad:</label>
            <input type="number" id="edad" name="edad" min="10" max="100" required><br>

            <label>Género:</label><br>
            <input type="radio" id="masculino" name="genero" value="Masculino" required>
            <label for="masculino">Masculino</label>

            <input type="radio" id="femenino" name="genero" value="Femenino">
            <label for="femenino">Femenino</label>

            <input type="radio" id="otro" name="genero" value="Otro">
            <label for="otro">Otro</label>
        </fieldset>

        <!-- 2. PREGUNTAS DE SELECCIÓN MÚLTIPLE -->
        <fieldset>
            <legend>Preferencias</legend>

            <p>¿Con qué frecuencia utilizas internet?</p>
            <input type="radio" id="diario" name="frecuencia" value="Diariamente" required>
            <label for="diario">Diariamente</label><br>

            <input type="radio" id="semanal" name="frecuencia" value="Varias veces a la semana">
            <label for="semanal">Varias veces a la semana</label><br>

            <input type="radio" id="rara" name="frecuencia" value="Rara vez">
            <label for="rara">Rara vez</label>

            <p>¿Qué dispositivos usas con frecuencia? (puedes seleccionar varios)</p>
            <input type="checkbox" id="computadora" name="dispositivo[]" value="Computadora">
            <label for="computadora">Computadora</label><br>

            <input type="checkbox" id="tablet" name="dispositivo[]" value="Tablet">
            <label for="tablet">Tablet</label><br>

            <input type="checkbox" id="telefono" name="dispositivo[]" value="Teléfono móvil">
            <label for="telefono">Teléfono móvil</label><br>

            <input type="checkbox" id="otroDisp" name="dispositivo[]" value="Otro">
            <label for="otroDisp">Otro</label>
        </fieldset>

        <!-- 3. COMENTARIOS FINALES -->
        <fieldset>
            <legend>Comentarios finales</legend>
            <label for="comentarios">¿Tienes alguna sugerencia o comentario?</label><br>
            <textarea id="comentarios" name="comentarios" rows="4" cols="40" placeholder="Escribe aquí tus observaciones..."></textarea>
        </fieldset>

        <button type="submit">Enviar encuesta</button>
        <button type="reset">Limpiar</button>
    </form>
</body>
</html>
