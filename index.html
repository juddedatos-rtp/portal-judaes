<!DOCTYPE html>
<html>
<head>
    <title>CETRAM App</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            padding: 20px;
        }

        h2 {
            color: #333;
        }

        .form {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        input {
            padding: 8px;
            margin: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            padding: 8px 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .guardar { background: #28a745; color: white; }
        .resumen { background: #007bff; color: white; }
        .limpiar { background: #dc3545; color: white; }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            margin-top: 15px;
        }

        th {
            background: #343a40;
            color: white;
        }

        td, th {
            padding: 10px;
            border: 1px solid #ddd;
            text-align: center;
        }

        .acciones button {
            margin: 2px;
        }

        .editar { background: #ffc107; }
        .eliminar { background: #dc3545; color: white; }

        .resumen-box {
            margin-top: 20px;
            background: white;
            padding: 15px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<h2>📋 Registro CETRAM</h2>

<div class="form">
    <input id="cetram" placeholder="CETRAM">
    <input id="modulo" placeholder="Módulo">
    <input id="codigo" placeholder="Código">

    <button class="guardar" onclick="guardar()">Guardar</button>
    <button class="resumen" onclick="generar()">Generar Resumen</button>
    <button class="limpiar" onclick="limpiar()">Limpiar</button>
</div>

<h3>📌 Registros capturados</h3>

<table>
    <thead>
        <tr>
            <th>CETRAM</th>
            <th>MÓDULO</th>
            <th>CÓDIGO</th>
            <th>ACCIONES</th>
        </tr>
    </thead>
    <tbody id="tablaDatos"></tbody>
</table>

<div class="resumen-box">
    <h3>📊 Resumen</h3>
    <table>
        <thead>
            <tr>
                <th>CETRAM</th>
                <th>MÓDULO</th>
                <th>CANTIDAD</th>
            </tr>
        </thead>
        <tbody id="tablaResumen"></tbody>
    </table>

    <h3 id="total"></h3>
</div>

<script>
let datos = JSON.parse(localStorage.getItem("datos")) || [];
let editando = null;

mostrarTabla();

function guardar() {
    const cetram = document.getElementById("cetram").value.toUpperCase();
    const modulo = document.getElementById("modulo").value;
    const codigo = document.getElementById("codigo").value;

    if (!cetram || !modulo || !codigo) {
        alert("Completa todos los campos");
        return;
    }

    if (editando !== null) {
        datos[editando] = { cetram, modulo, codigo };
        editando = null;
    } else {
        datos.push({ cetram, modulo, codigo });
    }

    localStorage.setItem("datos", JSON.stringify(datos));

    limpiarInputs();
    mostrarTabla();
}

function mostrarTabla() {
    const tbody = document.getElementById("tablaDatos");
    tbody.innerHTML = "";

    datos.forEach((d, i) => {
        tbody.innerHTML += `
        <tr>
            <td>${d.cetram}</td>
            <td>${d.modulo}</td>
            <td>${d.codigo}</td>
            <td class="acciones">
                <button class="editar" onclick="editar(${i})">Editar</button>
                <button class="eliminar" onclick="eliminar(${i})">Eliminar</button>
            </td>
        </tr>`;
    });
}

function editar(i) {
    const d = datos[i];
    document.getElementById("cetram").value = d.cetram;
    document.getElementById("modulo").value = d.modulo;
    document.getElementById("codigo").value = d.codigo;

    editando = i;
}

function eliminar(i) {
    if (confirm("¿Eliminar registro?")) {
        datos.splice(i, 1);
        localStorage.setItem("datos", JSON.stringify(datos));
        mostrarTabla();
    }
}

function generar() {
    let resumen = {};

    datos.forEach(d => {
        let key = d.cetram + "-" + d.modulo;

        if (!resumen[key]) {
            resumen[key] = {
                cetram: d.cetram,
                modulo: d.modulo,
                cantidad: 0
            };
        }

        resumen[key].cantidad++;
    });

    const tbody = document.getElementById("tablaResumen");
    tbody.innerHTML = "";

    let total = 0;

    Object.values(resumen).forEach(r => {
        tbody.innerHTML += `
        <tr>
            <td>${r.cetram}</td>
            <td>${r.modulo}</td>
            <td>${r.cantidad}</td>
        </tr>`;

        total += r.cantidad;
    });

    document.getElementById("total").innerText = "TOTAL: " + total;
}

function limpiar() {
    if (confirm("Borrar todo?")) {
        localStorage.clear();
        location.reload();
    }
}

function limpiarInputs() {
    document.getElementById("cetram").value = "";
    document.getElementById("modulo").value = "";
    document.getElementById("codigo").value = "";
}
</script>

</body>
</html>
