<!DOCTYPE html>
<html>
<head>
<title>Sistema CETRAM RTP</title>

<style>
body{
    font-family: Arial;
    background:#ffffff;
    padding:20px;
}

h2{color:#2e7d32;}

.form{
    background:#fff;
    padding:10px;
    border-left:6px solid #66bb6a;
    margin-bottom:20px;
}

input, select{
    padding:6px;
    margin:4px;
}

button{
    padding:6px 10px;
    cursor:pointer;
}

.bloques{
    display:flex;
    flex-wrap:wrap;
    gap:15px;
}

.cetram-box{
    border:1px solid #ccc;
    width:300px;
}

.cetram-box h3{
    margin:0;
    padding:5px;
    background:#66bb6a;
    text-align:center;
}

table{
    width:100%;
    border-collapse:collapse;
}

th, td{
    border:1px solid #ccc;
    text-align:center;
    font-size:12px;
    padding:4px;
}

th{
    background:#66bb6a;
}

.resumen{
    width:300px;
    margin-top:20px;
    border:1px solid #ccc;
    padding:10px;
}
</style>
</head>

<body>

<h2>🟢 Sistema CETRAM RTP</h2>

<div class="form">

<select id="cetram">
<option>ZARAGOZA</option>
<option>ZAPATA</option>
</select>

<input id="economico" placeholder="Económico">

<select id="modulo">
<option>Módulo 1</option>
<option>Módulo 2</option>
<option>Módulo 3</option>
<option>Módulo 4</option>
<option>Módulo 5</option>
<option>Módulo 6</option>
<option>Módulo 7</option>
</select>

<select id="ruta">
<option>162B</option>
<option>47A</option>
<option>163A</option>
<option>163B</option>
</select>

<button onclick="guardar()">Agregar</button>
<button onclick="generar()">Total</button>

</div>

<div class="bloques" id="contenedor"></div>

<div class="resumen">
<h4>Resumen</h4>
<div id="total"></div>
</div>

<script>

let datos = {
    "ZARAGOZA": [],
    "ZAPATA": []
};

function guardar(){
    let c = document.getElementById("cetram").value;
    let e = document.getElementById("economico").value;
    let m = document.getElementById("modulo").value;
    let r = document.getElementById("ruta").value;

    if(!e) return alert("Ingresa económico");

    datos[c].push({economico:e, modulo:m, ruta:r});

    document.getElementById("economico").value="";
    render();
}

function render(){
    let cont = document.getElementById("contenedor");
    cont.innerHTML="";

    Object.keys(datos).forEach(c=>{
        if(datos[c].length===0) return;

        let html = `
        <div class="cetram-box">
        <h3>${c}</h3>
        <table>
        <tr>
            <th>Economico</th>
            <th>Modulo</th>
            <th>Ruta</th>
        </tr>`;

        datos[c].forEach(d=>{
            html += `
            <tr>
                <td>${d.economico}</td>
                <td>${d.modulo}</td>
                <td>${d.ruta}</td>
            </tr>`;
        });

        html += "</table></div>";
        cont.innerHTML += html;
    });
}

function generar(){
    let total = 0;

    Object.keys(datos).forEach(c=>{
        total += datos[c].length;
    });

    document.getElementById("total").innerText = "TOTAL GENERAL: " + total;
}

</script>

</body>
</html>
